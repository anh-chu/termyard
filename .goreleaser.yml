version: 2
project_name: termyard
release:
  github:
    owner: anh-chu
    name: termyard
  draft: false
  # Mark nightly-* tags as GitHub prereleases; v* tags become stable releases.
  prerelease: auto
  name_template: "{{ .Tag }}"
before:
  hooks:
    - /usr/bin/make frontend
builds:
  - id: termyard
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      - -extldflags="-static"
      - -X '{{ .ModulePath }}/pkg/common.SUMMARY=v{{ .Version }}'
      - -X '{{ .ModulePath }}/pkg/common.BRANCH={{ .Branch }}'
      - -X '{{ .ModulePath }}/pkg/common.VERSION={{ .Tag }}'
      - -X '{{ .ModulePath }}/pkg/common.COMMIT={{ .Commit }}'
    mod_timestamp: "{{ .CommitTimestamp }}"
archives:
  - id: termyard
    builds:
      - termyard
    name_template: "{{ .ProjectName }}-v{{ .Version }}-{{ .Os }}-{{ .Arch }}{{ .Arm }}"
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: '{{ trimprefix .Summary "v" }}'
# We are skipping changelog because we are using release-please
changelog:
  disable: true
