name: GoReleaser

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "!v0.0.0-nightly.*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set GoReleaser args (release)
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "GORELEASER_ARGS=" >> $GITHUB_ENV

      - name: Set GoReleaser args (snapshot)
        if: startsWith(github.ref, 'refs/tags/') == false
        run: echo "GORELEASER_ARGS=--snapshot" >> $GITHUB_ENV

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean ${{ env.GORELEASER_ARGS }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
